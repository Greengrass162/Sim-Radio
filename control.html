<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Control Panel</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080809; --surface: #0f0f12; --border: #1c1c22; --border2: #252530;
  --accent: #e8181b; --accent2: #ff6b35; --text: #dddde8;
  --muted: #44444f; --muted2: #666675; --green: #00e676; --yellow: #ffd600; --blue: #448aff;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 20px; }
.brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.panel-status { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted2); display: flex; align-items: center; gap: 8px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.live-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.panel-id-box { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted2); background: var(--bg); border: 1px solid var(--border); padding: 6px 12px; }
.conn-count { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; color: var(--green); }
.conn-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
.layout { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 52px); }
.drivers-area { overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.drivers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 10px; }
.driver-card { background: var(--surface); border: 1px solid var(--border); padding: 14px; transition: border-color 0.2s; }
.driver-card.connected { border-color: var(--border2); }
.driver-card.firing { border-color: var(--accent); }
.driver-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.driver-info { display: flex; align-items: center; gap: 10px; }
.driver-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: var(--muted); min-width: 32px; }
.driver-card.connected .driver-num { color: var(--text); }
.driver-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted2); }
.driver-card.connected .driver-name { color: var(--text); }
.driver-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; padding: 2px 7px; border: 1px solid var(--muted); color: var(--muted); }
.driver-badge.online { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.06); }
.waveform-wrap { position: relative; height: 52px; background: var(--bg); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; cursor: crosshair; }
canvas.waveform { width: 100%; height: 100%; display: block; }
.crop-overlay { position: absolute; inset: 0; pointer-events: none; }
.crop-mask-left { position: absolute; top: 0; left: 0; bottom: 0; background: rgba(0,0,0,0.6); pointer-events: none; }
.crop-mask-right { position: absolute; top: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); pointer-events: none; }
.crop-handle { position: absolute; top: 0; bottom: 0; width: 3px; background: var(--yellow); cursor: ew-resize; pointer-events: all; z-index: 10; }
.crop-handle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 9px; height: 18px; background: var(--yellow); border-radius: 2px; }
.crop-region { position: absolute; top: 0; bottom: 0; border-top: 1px solid var(--yellow); border-bottom: 1px solid var(--yellow); background: rgba(255,214,0,0.06); pointer-events: none; }
/* Hide crop UI and fire button in live mode */
.driver-card:not(.frozen) .crop-mask-left,
.driver-card:not(.frozen) .crop-mask-right,
.driver-card:not(.frozen) .crop-handle,
.driver-card:not(.frozen) .crop-region { display: none; }
.driver-card:not(.frozen) [data-fire-btn] { display: none; }
.driver-card:not(.frozen) .crop-times { opacity: 0.3; pointer-events: none; }
.crop-times { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted2); }
.crop-times span { color: var(--yellow); }
.buffer-info { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted); margin-bottom: 10px; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.fire-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.fire-btn:hover:not(:disabled) { background: var(--accent); color: white; box-shadow: 0 0 20px rgba(232,24,27,0.3); }
.fire-btn.preview-btn { border-color: var(--blue); color: var(--blue); }
.fire-btn.preview-btn:hover:not(:disabled) { background: var(--blue); color: white; box-shadow: 0 0 20px rgba(68,138,255,0.3); }
.fire-btn:disabled { border-color: var(--muted); color: var(--muted); cursor: not-allowed; }
.driver-badge.frozen { border-color: var(--yellow); color: var(--yellow); background: rgba(255,214,0,0.08); animation: blink 0.8s infinite; }
.freeze-btn { padding: 2px 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--muted2); color: var(--muted2); background: transparent; cursor: pointer; transition: all 0.15s; }
.freeze-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.freeze-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,214,0,0.1); }
.settings-panel { background: var(--bg); border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 10px; display: none; }
.settings-panel.visible { display: block; }
.settings-panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.setting-row label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted2); cursor: pointer; }
.setting-row input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
.ghost-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,214,0,0.5); pointer-events: none; z-index: 5; transition: left 0.5s linear; }
.debug-line { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 6px; display: none; }
.debug-line.visible { display: block; }

.sidebar { border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-section { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
.field-group { margin-bottom: 14px; }
.field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--muted2); text-transform: uppercase; margin-bottom: 6px; display: block; }
.field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
.field-input:focus { border-color: var(--accent); }
.color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.copy-btn { width: 100%; padding: 9px; background: var(--border2); border: none; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; margin-bottom: 6px; }
.copy-btn:hover { background: var(--border); }
.copy-btn.red { background: var(--accent); color: white; }
.copy-btn.red:hover { background: #ff2528; }
.log-area { flex: 1; overflow-y: auto; padding: 12px 20px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.log-entry { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted2); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.log-entry .log-time { color: var(--muted); margin-right: 8px; }
.log-entry.fire { color: var(--accent); }
.log-entry.connect { color: var(--green); }
.log-entry.disconnect { color: var(--yellow); }
.f1-overlay { display: flex; align-items: stretch; height: 52px; opacity: 0.9; }
.f1-accent-bar { width: 6px; background: var(--accent); flex-shrink: 0; }
.f1-body { display: flex; flex-direction: column; justify-content: center; padding: 0 14px; min-width: 180px; background: rgba(20,20,25,0.95); }
.f1-car-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.5); line-height: 1; margin-bottom: 3px; }
.f1-driver-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 0.05em; color: white; }
.f1-radio-icon { display: flex; align-items: center; padding: 0 14px; gap: 6px; border-left: 1px solid rgba(255,255,255,0.1); background: rgba(20,20,25,0.95); }
.radio-waves { display: flex; flex-direction: column; gap: 3px; align-items: center; }
.radio-wave { height: 2px; background: white; border-radius: 1px; opacity: 0.6; }
.roster-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); }
.roster-item span { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); }
.roster-item button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
.obs-link-box { width: 100%; background: var(--bg); border: 1px solid var(--border2); padding: 10px 12px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--blue); word-break: break-all; margin-bottom: 8px; }
.tabs { display: flex; align-items: center; gap: 2px; }
.tab-btn { padding: 0 16px; height: 32px; background: transparent; border: 1px solid var(--border); color: var(--muted2); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover { border-color: var(--border2); color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.text-card { background: var(--surface); border: 1px solid var(--border2); padding: 14px; }
.text-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.text-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; resize: none; min-height: 52px; max-height: 120px; transition: border-color 0.2s; margin-bottom: 10px; overflow-y: auto; }
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { color: var(--muted); }
.text-fire-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.text-fire-btn:hover:not(:disabled) { background: var(--accent); color: white; box-shadow: 0 0 20px rgba(232,24,27,0.3); }
.text-fire-btn:disabled { border-color: var(--muted); color: var(--muted); cursor: not-allowed; }
.text-card.firing { border-color: var(--accent); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="brand"><div class="brand-dot"></div>Radio Control Panel</div>
    <div class="panel-status"><div class="live-dot" id="panelLiveDot"></div><span id="panelStatusText">Initializing...</span></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('audio')">⬤ Audio</button>
      <button class="tab-btn" onclick="switchTab('text')">T Text</button>
    </div>
  </div>
  <div class="topbar-right">
    <div><div class="conn-count" id="connCount">0</div><div class="conn-label">Connected</div></div>
    <div class="panel-id-box" id="panelIdBox">Panel ID: loading...</div>
  </div>
</div>

<div class="layout">
  <!-- AUDIO TAB -->
  <div class="tab-content active" id="tab-audio" style="display:contents;">
  <div class="drivers-area">
    <div class="section-label">Live Driver Feeds</div>
    <div class="drivers-grid" id="driversGrid"></div>
  </div>
  </div>

  <!-- TEXT TAB -->
  <div class="tab-content" id="tab-text" style="grid-column:1;overflow-y:auto;padding:20px;">
    <div class="section-label">Text Overlays</div>
    <div id="textDriversGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;"></div>
  </div>
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Overlay Settings</div>
      <div class="field-group">
        <label class="field-label">Car Type Label</label>
        <input type="text" class="field-input" id="settingCarType" value="DRIVER RADIO">
      </div>
      <div class="color-row">
        <div class="field-group">
          <label class="field-label">Accent Color</label>
          <input type="color" class="field-input" id="settingColor" value="#e8181b" style="height:38px;padding:4px 8px;cursor:pointer;">
        </div>
        <div class="field-group">
          <label class="field-label">Text Color</label>
          <input type="color" class="field-input" id="settingTextColor" value="#ffffff" style="height:38px;padding:4px 8px;cursor:pointer;">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Overlay Position</label>
        <select class="field-input" id="settingPosition" style="appearance:none;cursor:pointer;">
          <option value="bottom-left">Bottom Left (F1 Style)</option>
          <option value="bottom-right">Bottom Right</option>
          <option value="middle-left">Middle Left</option>
          <option value="middle-right">Middle Right</option>
          <option value="top-left">Top Left</option>
          <option value="top-right">Top Right</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Driver Roster</div>
      <div id="rosterList" style="margin-bottom:12px;display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;"></div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <input type="text" class="field-input" id="newDriverInput" placeholder="Driver name..." style="margin:0;flex:1;" onkeydown="if(event.key==='Enter')addDriver()">
        <button onclick="addDriver()" style="padding:9px 14px;background:var(--accent);border:none;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;">ADD</button>
      </div>
      <button class="copy-btn" onclick="clearRoster()" style="margin-bottom:6px;color:var(--accent);border:1px solid var(--accent);background:transparent;">Clear All Drivers</button>
      <button class="copy-btn red" onclick="copyDriverLink(this)">Copy Driver Link</button>
      <div class="obs-link-box" style="font-size:9px;">http://racingsimradio.live/driver.html</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">OBS Browser Source</div>
      <div class="obs-link-box" id="obsUrlBox">http://racingsimradio.live/obs.html</div>
      <button class="copy-btn red" onclick="copyOBSUrl(this)">Copy OBS URL</button>
      <button class="copy-btn" onclick="copyOBSInstructions(this)">Copy Setup Instructions</button>
    </div>

    <div class="sidebar-section" style="flex:0 0 auto;">
      <div class="sidebar-title">Overlay Preview</div>
      <div style="padding:12px;background:rgba(0,0,0,0.4);">
        <div class="f1-overlay">
          <div class="f1-accent-bar" id="previewAccentBar"></div>
          <div class="f1-body">
            <div class="f1-car-label" id="previewCarLabel">DRIVER RADIO</div>
            <div class="f1-driver-label" id="previewDriverLabel">DRIVER NAME</div>
          </div>
          <div class="f1-radio-icon">
            <div class="radio-waves">
              <div class="radio-wave" style="width:16px"></div>
              <div class="radio-wave" style="width:12px"></div>
              <div class="radio-wave" style="width:8px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;">
      <div class="sidebar-title">Event Log</div>
      <div class="log-area" id="logArea"></div>
    </div>
  </div>
</div>

<div style="position:fixed;bottom:6px;right:10px;font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a2a35;pointer-events:none;z-index:9999;">V25</div>

<script>
const PANEL_ID = 'simradio_control_panel_v1';
const OBS_PEER_ID = 'simradio_obs_output_v1';
const BUFFER_SECONDS = 60;
const PEER_CONFIG = {
  debug: 0,
  host: 'peerjs.92k.de',
  port: 443,
  path: '/',
  secure: true,
  config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
};

let peer;
let drivers = {};
let obsConnection = null;
let connectedCount = 0;
let rosterDrivers = [];
let takenNames = new Set(); // names currently in use
let rosterConns = []; // driver pages connected for roster sync

// Push roster to all listening driver pages
function broadcastRoster() {
  const payload = JSON.stringify({
    type: 'roster_update',
    roster: rosterDrivers,
    taken: Array.from(takenNames)
  });
  rosterConns = rosterConns.filter(c => c.open);
  rosterConns.forEach(c => { try { c.send(payload); } catch(e) {} });
  // Also send to active audio connections
  Object.values(drivers).forEach(d => {
    if (d.conn && d.conn.open) { try { d.conn.send(payload); } catch(e) {} }
  });
}

// ---- PEER INIT ----
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    try { initPanel(); } catch(e) { console.error('Panel init error:', e); }
  }, 800);
});

function initPanel() {
  log('Initializing...', 'info');
  peer = new Peer(PANEL_ID, PEER_CONFIG);

  peer.on('open', (id) => {
    document.getElementById('panelIdBox').textContent = 'Panel ID: ' + id;
    document.getElementById('panelLiveDot').classList.add('on');
    document.getElementById('panelStatusText').textContent = 'Panel online — waiting for drivers';
    log('Panel online', 'connect');
    tryConnectOBS();
  });

  peer.on('connection', (conn) => {
    const meta = conn.metadata || {};

    // OBS connection
    if (!meta.driverName && meta.type !== 'roster_request' && meta.type !== 'audio') {
      conn.on('open', () => {
        obsConnection = conn;
        log('OBS connected', 'connect');
        conn.on('close', () => { obsConnection = null; log('OBS disconnected', 'disconnect'); });
        conn.on('data', () => {});
      });
      return;
    }

    // Roster request connection — driver page fetching the name list
    if (meta.type === 'roster_request') {
      conn.on('open', () => {
        rosterConns.push(conn);
        // Send current roster immediately
        try {
          conn.send(JSON.stringify({
            type: 'roster_update',
            roster: rosterDrivers,
            taken: Array.from(takenNames)
          }));
        } catch(e) {}
        conn.on('close', () => { rosterConns = rosterConns.filter(c => c !== conn); });
      });
      return;
    }

    const driverName = meta.driverName;
    const peerId = conn.peer;

    conn.on('open', () => {
      log('Driver connected: ' + driverName, 'connect');

      if (!drivers[peerId]) {
        const num = Object.keys(drivers).length + 1;
        drivers[peerId] = {
          peerId, name: driverName, connected: true, num,
          chunks: [], allChunks: [],
          bufferDuration: 0, cropStart: 0.1, cropEnd: 0.9,
          animFrame: null, waveformData: [], frozenWaveformData: [], cardEl: null,
          mimeType: 'audio/webm',
          frozen: false,
          frozenChunkCount: 0,
          settings: { showPlayhead: true, timeCrop: true },
        };
        connectedCount++;
        updateConnCount();
        createCard(peerId);
        startWaveformDraw(peerId);
      } else {
        drivers[peerId].connected = true;
        drivers[peerId].name = driverName;
        connectedCount++;
        updateConnCount();
        updateCard(peerId);
      }

      conn.on('data', (raw) => {
        try {
          const msg = JSON.parse(raw);
          if (msg.type === 'chunk') handleChunk(peerId, msg);
          if (msg.type === 'name_taken') {
            takenNames.add(msg.driverName);
            broadcastRoster();
          }
        } catch(e) {}
      });

      // Store conn reference for roster broadcasts
      if (drivers[peerId]) drivers[peerId].conn = conn;

      conn.on('close', () => {
        if (drivers[peerId]) {
          const name = drivers[peerId].name;
          drivers[peerId].connected = false;
          connectedCount = Math.max(0, connectedCount - 1);
          updateConnCount();
          updateCard(peerId);
          // Release the name so others can use it
          takenNames.delete(name);
          broadcastRoster();
          log('Disconnected: ' + driverName, 'disconnect');
        }
      });
    });
  });

  peer.on('error', (err) => {
    log('Peer error: ' + err.type, 'fire');
    if (err.type !== 'unavailable-id') setTimeout(initPanel, 3000);
  });
}

let obsRetryTimer = null;
let obsConnecting = false;

function tryConnectOBS() {
  if (obsConnecting || (obsConnection && obsConnection.open)) return;
  obsConnecting = true;
  clearTimeout(obsRetryTimer);

  const conn = peer.connect(OBS_PEER_ID, { reliable: true });
  conn.on('open', () => {
    obsConnecting = false;
    obsConnection = conn;
    log('OBS linked', 'connect');
    conn.on('close', () => {
      obsConnection = null;
      obsRetryTimer = setTimeout(tryConnectOBS, 5000);
    });
  });
  conn.on('error', () => {
    obsConnecting = false;
    obsRetryTimer = setTimeout(tryConnectOBS, 8000);
  });
  // Timeout if no response
  setTimeout(() => {
    if (obsConnecting) {
      obsConnecting = false;
      obsRetryTimer = setTimeout(tryConnectOBS, 8000);
    }
  }, 8000);
}

// ---- AUDIO CHUNK HANDLING ----
function handleChunk(peerId, msg) {
  const d = drivers[peerId];
  if (!d) return;

  d.mimeType = msg.mimeType || 'audio/webm';

  const binary = atob(msg.data);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: d.mimeType });

  if (msg.isFirst) {
    d.allChunks = [blob];
    d.chunks = [blob];
  } else {
    d.allChunks.push(blob);
    if (d.allChunks.length > BUFFER_SECONDS + 1) {
      d.allChunks = [d.allChunks[0], ...d.allChunks.slice(-BUFFER_SECONDS)];
    }
    d.chunks.push(blob);
    if (d.chunks.length > BUFFER_SECONDS) d.chunks.shift();
  }

  d.bufferDuration = d.chunks.length;

  const fireBtn = d.cardEl && d.cardEl.querySelector('[data-fire-btn]');
  const previewBtn = d.cardEl && d.cardEl.querySelector('[data-preview-btn]');
  if (fireBtn) fireBtn.disabled = false;
  if (previewBtn) previewBtn.disabled = false;

  const dbg = d.cardEl && d.cardEl.querySelector('[data-dbg]');
  if (dbg) dbg.textContent = `chunks:${d.chunks.length} size:${msg.size}b — decoding...`;

  // Decode for waveform
  new Blob(d.allChunks, { type: d.mimeType }).arrayBuffer().then(buf => {
    const ctx = new AudioContext();
    ctx.decodeAudioData(buf.slice(0), (decoded) => {
      ctx.close();
      const ch = decoded.getChannelData(0);
      const pts = 200, step = Math.max(1, Math.floor(ch.length / pts));
      const newData = [];
      for (let i = 0; i < pts; i++) {
        const s = i * step, end = Math.min(s + step, ch.length);
        let sum = 0;
        for (let j = s; j < end; j++) sum += ch[j] * ch[j];
        newData.push(Math.sqrt(sum / (end - s)));
      }
      d.waveformData = newData;
      const peak = Math.max(...newData);
      if (dbg) dbg.textContent = `chunks:${d.chunks.length} dur:${decoded.duration.toFixed(1)}s peak:${peak.toFixed(4)}`;
    }, (err) => {
      ctx.close();
      if (dbg) dbg.textContent = `chunks:${d.chunks.length} — decode err (normal for first chunk)`;
    });
  });
}

// ---- CROP HANDLES ----
function setupCropHandles(peerId, card) {
  const d = drivers[peerId];
  const wrap = card.querySelector('[data-waveform-wrap]');
  const handleStart = card.querySelector('[data-handle="start"]');
  const handleEnd = card.querySelector('[data-handle="end"]');
  let dragging = null;

  function onMove(e) {
    if (!dragging) return;
    const rect = wrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    if (dragging === 'start') d.cropStart = Math.min(pct, d.cropEnd - 0.05);
    else d.cropEnd = Math.max(pct, d.cropStart + 0.05);
    updateCropUI(peerId, card);
  }

  handleStart.addEventListener('mousedown', (e) => { dragging = 'start'; e.preventDefault(); });
  handleEnd.addEventListener('mousedown', (e) => { dragging = 'end'; e.preventDefault(); });
  handleStart.addEventListener('touchstart', () => { dragging = 'start'; }, { passive: true });
  handleEnd.addEventListener('touchstart', () => { dragging = 'end'; }, { passive: true });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', () => { dragging = null; });
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', () => { dragging = null; });
}

function updateCropUI(peerId, card) {
  const d = drivers[peerId];
  const s = d.cropStart, e = d.cropEnd;
  card.querySelector('[data-mask-left]').style.width = (s * 100) + '%';
  card.querySelector('[data-mask-right]').style.width = ((1 - e) * 100) + '%';
  card.querySelector('[data-crop-region]').style.cssText = `left:${s*100}%;right:${(1-e)*100}%;position:absolute;top:0;bottom:0;border-top:1px solid var(--yellow);border-bottom:1px solid var(--yellow);background:rgba(255,214,0,0.06);pointer-events:none;`;
  card.querySelector('[data-handle="start"]').style.left = (s * 100) + '%';
  card.querySelector('[data-handle="end"]').style.left = (e * 100) + '%';

  // Use frozen buffer duration if frozen, otherwise live
  const buf = d.frozen ? (d.frozenBufDuration || d.bufferDuration) : d.bufferDuration;

  if (d.frozen && d.settings.timeCrop) {
    // Show absolute time from end of buffer (e.g. "-12.3s" ago)
    const tStart = (s - 1) * buf;
    const tEnd = (e - 1) * buf;
    card.querySelector('[data-time-start]').textContent = tStart.toFixed(1) + 's';
    card.querySelector('[data-time-end]').textContent = tEnd.toFixed(1) + 's';
    card.querySelector('[data-time-dur]').textContent = ((e - s) * buf).toFixed(1) + 's';
  } else {
    card.querySelector('[data-time-start]').textContent = (s * buf).toFixed(1) + 's';
    card.querySelector('[data-time-end]').textContent = (e * buf).toFixed(1) + 's';
    card.querySelector('[data-time-dur]').textContent = ((e - s) * buf).toFixed(1) + 's';
  }

  const bufInfo = card.querySelector('[data-buf-info]');
  if (bufInfo) {
    if (d.frozen) {
      const behind = d.chunks.length - d.frozenChunkCount;
      bufInfo.textContent = `Frozen — ${buf.toFixed(0)}s captured${behind > 0 ? ` (+${behind}s new behind)` : ''}`;
    } else {
      bufInfo.textContent = 'Buffer: ' + buf.toFixed(1) + 's (last 60s rolling)';
    }
  }
}

  const settings = getSettings();

    type: 'text_fire',
    driverName,
    carType: settings.carType,
    accentColor: settings.accentColor,
    textColor: settings.textColor,
    position: settings.position,
    message: text,
  });

  if (obsConnection && obsConnection.open) {

    btn.textContent = '⬤ FIRE TEXT TO OBS';
    btn.disabled = false;
    card.classList.remove('firing');

}


function toggleFreeze(peerId) {
  const d = drivers[peerId];
  if (!d) return;
  d.frozen = !d.frozen;
  const btn = d.cardEl.querySelector('[data-freeze-btn]');
  const badge = d.cardEl.querySelector('[data-badge]');
  const ghost = d.cardEl.querySelector('[data-ghost-playhead]');

  if (d.frozen) {
    // Snapshot current waveform and chunk count
    d.frozenWaveformData = [...d.waveformData];
    d.frozenChunkCount = d.chunks.length;
    d.frozenBufDuration = d.bufferDuration;
    btn.textContent = '▶ RESUME';
    btn.classList.add('active');
    badge.textContent = 'FROZEN';
    badge.className = 'driver-badge frozen';
    d.cardEl.classList.add('frozen');
    // Stop any active monitor
    if (monitorContexts[peerId]) {
      try { monitorContexts[peerId].close(); } catch(e) {}
      delete monitorContexts[peerId];
      const previewBtn = d.cardEl.querySelector('[data-preview-btn]');
      if (previewBtn) { previewBtn.style.borderColor = ''; previewBtn.style.color = ''; }
    }
    const previewBtn = d.cardEl.querySelector('[data-preview-btn]');
    if (previewBtn) previewBtn.textContent = '▶ PREVIEW CLIP';
    if (ghost && d.settings.showPlayhead) ghost.style.display = 'block';
    log('Frozen: ' + d.name, 'disconnect');
  } else {
    d.frozenWaveformData = [];
    d.cropStart = 0.1;
    d.cropEnd = 0.9;
    btn.textContent = '❚❚ FREEZE';
    btn.classList.remove('active');
    badge.textContent = 'LIVE';
    badge.className = 'driver-badge online';
    d.cardEl.classList.remove('frozen');
    const previewBtn = d.cardEl.querySelector('[data-preview-btn]');
    if (previewBtn) { previewBtn.textContent = '▶ MONITOR'; previewBtn.style.borderColor = ''; previewBtn.style.color = ''; }
    if (ghost) ghost.style.display = 'none';
    log('Resumed: ' + d.name, 'connect');
  }
}

// ---- WAVEFORM ----
function startWaveformDraw(peerId) {
  const d = drivers[peerId];
  if (!d || !d.cardEl) return;
  const canvas = d.cardEl.querySelector('[data-canvas]');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function draw() {
    if (!drivers[peerId]) return;
    const W = canvas.offsetWidth * window.devicePixelRatio;
    const H = canvas.offsetHeight * window.devicePixelRatio;
    if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#080809';
    ctx.fillRect(0, 0, W, H);

    // Use frozen snapshot or live data
    const data = d.frozen && d.frozenWaveformData.length ? d.frozenWaveformData : d.waveformData;

    if (data.length > 0) {
      const peak = Math.max(...data, 0.001);
      const barW = W / data.length;
      const s = d.cropStart, e = d.cropEnd;
      for (let i = 0; i < data.length; i++) {
        const pct = i / data.length;
        // In live mode: all bars red. In frozen mode: crop region red, rest dark.
        const inCrop = d.frozen ? (pct >= s && pct <= e) : true;
        const h = Math.max(1, (data[i] / peak) * H * 0.9);
        ctx.fillStyle = inCrop ? '#e8181b' : '#2a2a35';
        ctx.fillRect(i * barW, (H - h) / 2, Math.max(barW - 1, 1), h);
      }
    }

    // Live playhead (right edge when live)
    if (!d.frozen && d.settings.showPlayhead) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W - 1, 0);
      ctx.lineTo(W - 1, H);
      ctx.stroke();
    }

    // Ghost playhead when frozen — disabled, removed per request

    updateCropUI(peerId, d.cardEl);
    d.animFrame = requestAnimationFrame(draw);
  }

  if (d.animFrame) cancelAnimationFrame(d.animFrame);
  draw();
}

// ---- PREVIEW ----
// Track active monitor contexts per driver
const monitorContexts = {};

async function previewClip(peerId) {
  const d = drivers[peerId];
  const btn = d.cardEl.querySelector('[data-preview-btn]');

  if (!d.frozen) {
    // MONITOR MODE — toggle on/off
    if (monitorContexts[peerId]) {
      // Already monitoring — stop it
      try { monitorContexts[peerId].close(); } catch(e) {}
      delete monitorContexts[peerId];
      btn.textContent = '▶ MONITOR';
      log('Monitor off: ' + d.name, 'info');
      return;
    }

    if (!d.allChunks || d.allChunks.length < 2) {
      log('Need more buffer — wait a few seconds', 'disconnect');
      return;
    }

    btn.textContent = '◼ MONITORING';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';

    async function playLatest() {
      // Check still monitoring and not frozen
      if (!monitorContexts[peerId] || d.frozen) {
        btn.textContent = '▶ MONITOR';
        btn.style.borderColor = '';
        btn.style.color = '';
        delete monitorContexts[peerId];
        return;
      }
      const liveChunks = d.chunks.slice(-5);
      if (!liveChunks.length || !d.allChunks[0]) { setTimeout(playLatest, 1000); return; }
      const blob = new Blob([d.allChunks[0], ...liveChunks], { type: d.mimeType });
      try {
        const buf = await blob.arrayBuffer();
        const ctx = new AudioContext();
        monitorContexts[peerId] = ctx;
        await ctx.resume();
        ctx.decodeAudioData(buf.slice(0), (decoded) => {
          const src = ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(ctx.destination);
          src.start(0);
          src.onended = () => {
            ctx.close();
            // Continue looping with latest chunks
            setTimeout(playLatest, 200);
          };
        }, () => { ctx.close(); setTimeout(playLatest, 1000); });
      } catch(e) { setTimeout(playLatest, 1000); }
    }

    monitorContexts[peerId] = true; // placeholder so toggle check works
    log('Monitor on: ' + d.name, 'info');
    playLatest();

  } else {
    // FROZEN MODE — play exactly what's between the handles right now
    if (!d.allChunks || d.allChunks.length < 2) { log('Need more buffer', 'disconnect'); return; }
    btn.textContent = '▶ PLAYING...';
    btn.disabled = true;
    const reset = () => { btn.textContent = '▶ PREVIEW CLIP'; btn.disabled = false; };

    // Read crop values fresh at click time
    const total = d.frozenChunkCount;
    const si = Math.floor(d.cropStart * total);
    const ei = Math.max(si + 1, Math.ceil(d.cropEnd * total));
    const selected = d.chunks.slice(si, ei);
    if (!selected.length) { reset(); return; }
    const playBlob = new Blob([d.allChunks[0], ...selected], { type: d.mimeType });
    try {
      const buf = await playBlob.arrayBuffer();
      const ctx = new AudioContext();
      await ctx.resume();
      ctx.decodeAudioData(buf.slice(0), (decoded) => {
        const src = ctx.createBufferSource();
        src.buffer = decoded;
        src.connect(ctx.destination);
        src.start(0);
        log('Preview: ' + d.name + ' (' + decoded.duration.toFixed(1) + 's)', 'info');
        src.onended = () => { ctx.close(); reset(); };
        setTimeout(() => { try { ctx.close(); } catch(e) {} reset(); }, (decoded.duration * 1000) + 500);
      }, (err) => { ctx.close(); log('Preview decode err: ' + err, 'fire'); reset(); });
    } catch(e) { log('Preview error: ' + e.message, 'fire'); reset(); }
  }
}

// ---- FIRE ----
async function fireClip(peerId) {
  const d = drivers[peerId];
  if (!d || !d.allChunks || d.allChunks.length < 2) return;

  const btn = d.cardEl.querySelector('[data-fire-btn]');
  btn.textContent = '⬤ SENDING...';
  btn.disabled = true;
  d.cardEl.classList.add('firing');
  setTimeout(() => { d.cardEl.classList.remove('firing'); btn.textContent = '⬤ FIRE TO OBS'; btn.disabled = false; }, 400);

  const total = d.frozen ? d.frozenChunkCount : d.chunks.length;
  const si = Math.floor(d.cropStart * total);
  const ei = Math.max(si + 1, Math.floor(d.cropEnd * total));
  const selected = d.chunks.slice(si, ei);
  const fireBlob = new Blob([d.allChunks[0], ...selected], { type: d.mimeType });

  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(fireBlob);
  });

  // Decode locally to get real duration in seconds
  let realDuration = selected.length; // fallback
  try {
    const buf = await fireBlob.arrayBuffer();
    const actx = new AudioContext();
    await new Promise(resolve => {
      actx.decodeAudioData(buf.slice(0), (decoded) => {
        realDuration = decoded.duration;
        actx.close();
        resolve();
      }, () => { actx.close(); resolve(); });
    });
  } catch(e) {}

  const settings = getSettings();
  const payload = JSON.stringify({
    type: 'radio_fire',
    driverName: d.name,
    carType: settings.carType,
    accentColor: settings.accentColor,
    textColor: settings.textColor,
    position: settings.position,
    audio: base64,
    mimeType: d.mimeType,
    duration: realDuration,
  });

  if (obsConnection && obsConnection.open) {
    obsConnection.send(payload);
    log('FIRED: ' + d.name + ' (' + selected.length + 's)', 'fire');
  } else {
    log('OBS not connected — retrying connection...', 'disconnect');
    tryConnectOBS();
  }
}

// ---- SETTINGS ----
function getSettings() {
  return {
    carType: document.getElementById('settingCarType').value || 'DRIVER RADIO',
    accentColor: document.getElementById('settingColor').value,
    textColor: document.getElementById('settingTextColor').value,
    position: document.getElementById('settingPosition').value,
  };
}

document.getElementById('settingCarType').addEventListener('input', updatePreview);
document.getElementById('settingColor').addEventListener('input', updatePreview);
document.getElementById('settingTextColor').addEventListener('input', updatePreview);

function updatePreview() {
  const s = getSettings();
  document.getElementById('previewAccentBar').style.background = s.accentColor;
  document.getElementById('previewCarLabel').style.color = s.textColor + '80';
  document.getElementById('previewCarLabel').textContent = s.carType;
  document.getElementById('previewDriverLabel').style.color = s.textColor;
}

// ---- ROSTER ----
function clearRoster() {
  if (!rosterDrivers.length) return;
  if (!confirm('Clear all drivers from the roster?')) return;
  rosterDrivers = [];
  takenNames = new Set();
  renderRoster();
  broadcastRoster();
  log('Roster cleared', 'disconnect');
}

function addDriver() {
  const input = document.getElementById('newDriverInput');
  const name = input.value.trim();
  if (!name || rosterDrivers.includes(name)) { input.value = ''; return; }
  rosterDrivers.push(name);
  input.value = '';
  renderRoster();
  broadcastRoster();
  log('Added: ' + name, 'info');
}

function removeDriver(i) {
  rosterDrivers.splice(i, 1);
  renderRoster();
  broadcastRoster();
}

function renderRoster() {
  const list = document.getElementById('rosterList');
  if (!rosterDrivers.length) { list.innerHTML = '<div style="font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--muted);">No drivers added yet</div>'; return; }
  list.innerHTML = rosterDrivers.map((name, i) => `
    <div class="roster-item"><span>${name}</span><button onclick="removeDriver(${i})">✕</button></div>
  `).join('');
  // Refresh text tab if visible
  if (document.getElementById('tab-text').style.display !== 'none') renderTextCards();
}

function copyDriverLink(btn) {
  navigator.clipboard.writeText('http://racingsimradio.live/driver.html').then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Driver Link', 1500);
  });
}

function removeDriverCard(peerId) {
  const d = drivers[peerId];
  if (!d) return;
  if (d.animFrame) cancelAnimationFrame(d.animFrame);
  if (d.cardEl) d.cardEl.remove();
  if (d.connected) { connectedCount = Math.max(0, connectedCount - 1); updateConnCount(); }
  delete drivers[peerId];
  log('Removed card: ' + (d.name || peerId), 'disconnect');
}

function copyOBSUrl(btn) {
  const url = document.getElementById('obsUrlBox').textContent.trim();
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy OBS URL', 1500);
  });
}

function copyOBSInstructions(btn) {
  const txt = 'OBS Browser Source Setup:\n1. In OBS, add a Browser Source\n2. URL: http://racingsimradio.live/obs.html\n3. Width: 1280, Height: 720\n4. Uncheck "Control audio via OBS"';
  navigator.clipboard.writeText(txt).then(() => { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy Setup Instructions', 1500); });
}

// ---- UTILS ----
function updateConnCount() { document.getElementById('connCount').textContent = connectedCount; }

function log(msg, type) {
  const area = document.getElementById('logArea');
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
  const el = document.createElement('div');
  el.className = 'log-entry ' + (type || '');
  el.innerHTML = `<span class="log-time">${time}</span>${msg}`;
  area.insertBefore(el, area.firstChild);
  while (area.children.length > 80) area.removeChild(area.lastChild);
}

renderRoster();
</script>
