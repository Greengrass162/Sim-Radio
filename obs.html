<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBS Radio Output</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1280px; height: 720px; background: transparent !important; overflow: hidden; }

.radio-overlay {
  position: absolute;
  display: flex;
  align-items: stretch;
  opacity: 0;
  pointer-events: none;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.7));
  bottom: 80px;
  left: 60px;
}
.radio-overlay.pos-bottom-left  { bottom: 50px; left: 40px; top: auto; right: auto; }
.radio-overlay.pos-bottom-right { bottom: 50px; right: 40px; left: auto; top: auto; }
.radio-overlay.pos-middle-left  { top: 50%; left: 40px; transform: translateY(-50%); right: auto; bottom: auto; }
.radio-overlay.pos-middle-right { top: 50%; right: 40px; transform: translateY(-50%); left: auto; bottom: auto; }
.radio-overlay.pos-top-left     { top: 50px; left: 40px; bottom: auto; right: auto; }
.radio-overlay.pos-top-right    { top: 50px; right: 40px; bottom: auto; left: auto; }

@keyframes slideInLeft  { 0%{opacity:0;transform:translateX(-32px)} 15%{opacity:1;transform:translateX(4px)} 22%{transform:translateX(0)} 100%{opacity:1;transform:translateX(0)} }
@keyframes slideInRight { 0%{opacity:0;transform:translateX(32px)}  15%{opacity:1;transform:translateX(-4px)} 22%{transform:translateX(0)} 100%{opacity:1;transform:translateX(0)} }
@keyframes slideOutLeft  { 0%{opacity:1;transform:translateX(0)} 70%{opacity:1;transform:translateX(0)} 100%{opacity:0;transform:translateX(-20px)} }
@keyframes slideOutRight { 0%{opacity:1;transform:translateX(0)} 70%{opacity:1;transform:translateX(0)} 100%{opacity:0;transform:translateX(20px)} }

.radio-overlay.show-left  { animation: slideInLeft  0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.radio-overlay.show-right { animation: slideInRight 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.radio-overlay.hide-left  { animation: slideOutLeft  0.4s ease-in forwards; }
.radio-overlay.hide-right { animation: slideOutRight 0.4s ease-in forwards; }

.accent-bar { width: 8px; background: #e8181b; flex-shrink: 0; }
.overlay-body {
  background: rgba(12,12,15,0.94);
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 20px; min-width: 260px;
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.car-type-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.45); line-height: 1; margin-bottom: 4px; }
.driver-name-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 30px; text-transform: uppercase; letter-spacing: 0.04em; color: #ffffff; line-height: 1; }
.radio-section {
  background: rgba(12,12,15,0.94);
  display: flex; align-items: center; padding: 0 18px; gap: 12px;
  border: 1px solid rgba(255,255,255,0.06); border-left: 1px solid rgba(255,255,255,0.07);
}
.radio-icon { width: 20px; display: flex; flex-direction: column; gap: 4px; align-items: center; }
.radio-bar { height: 3px; background: rgba(255,255,255,0.7); border-radius: 2px; }
@keyframes wave1 { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.3)} }
@keyframes wave2 { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }
@keyframes wave3 { 0%,100%{transform:scaleY(0.8)} 33%{transform:scaleY(0.2)} 66%{transform:scaleY(1)} }
.radio-bar:nth-child(1) { width: 20px; animation: wave1 0.6s ease-in-out infinite; }
.radio-bar:nth-child(2) { width: 14px; animation: wave2 0.5s ease-in-out infinite 0.1s; }
.radio-bar:nth-child(3) { width: 18px; animation: wave3 0.7s ease-in-out infinite 0.05s; }
.radio-bar:nth-child(4) { width: 10px; animation: wave1 0.45s ease-in-out infinite 0.15s; }
.radio-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); writing-mode: vertical-lr; transform: rotate(180deg); }

/* TEXT OVERLAY */
.text-overlay {
  position: absolute;
  display: flex;
  align-items: stretch;
  opacity: 0;
  pointer-events: none;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.7));
}
.text-overlay.pos-bottom-left  { bottom: 50px; left: 40px; top: auto; right: auto; }
.text-overlay.pos-bottom-right { bottom: 50px; right: 40px; left: auto; top: auto; }
.text-overlay.pos-middle-left  { top: 50%; left: 40px; transform: translateY(-50%); right: auto; bottom: auto; }
.text-overlay.pos-middle-right { top: 50%; right: 40px; transform: translateY(-50%); left: auto; bottom: auto; }
.text-overlay.pos-top-left     { top: 50px; left: 40px; bottom: auto; right: auto; }
.text-overlay.pos-top-right    { top: 50px; right: 40px; bottom: auto; left: auto; }
.text-overlay.show-left  { animation: slideInLeft  0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.text-overlay.show-right { animation: slideInRight 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.text-overlay.hide-left  { animation: slideOutLeft  0.4s ease-in forwards; }
.text-overlay.hide-right { animation: slideOutRight 0.4s ease-in forwards; }
.text-accent-bar { width: 8px; flex-shrink: 0; }
.text-overlay-body {
  background: rgba(12,12,15,0.94);
  display: flex; flex-direction: column; justify-content: center;
  padding: 10px 16px; min-width: 260px; max-width: 580px;
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.text-driver-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.45); line-height: 1; margin-bottom: 5px; }
.text-message { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; color: #ffffff; line-height: 1.2; letter-spacing: 0.02em; min-height: 1.3em; word-break: break-word; }
.text-cursor { display: inline-block; width: 2px; height: 0.85em; background: white; margin-left: 2px; vertical-align: middle; animation: cursorBlink 0.6s infinite; }
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div class="radio-overlay pos-bottom-left" id="radioOverlay">
  <div class="accent-bar" id="accentBar"></div>
  <div class="overlay-body">
    <div class="car-type-label" id="carTypeLabel">DRIVER RADIO</div>
    <div class="driver-name-label" id="driverNameLabel">DRIVER</div>
  </div>
  <div class="radio-section">
    <div class="radio-icon">
      <div class="radio-bar"></div>
      <div class="radio-bar"></div>
      <div class="radio-bar"></div>
      <div class="radio-bar"></div>
    </div>
    <div class="radio-label">Radio</div>
  </div>
</div>

<!-- TEXT OVERLAY -->
<div class="text-overlay pos-bottom-left" id="textOverlay">
  <div class="text-accent-bar" id="textAccentBar"></div>
  <div class="text-overlay-body">
    <div class="text-driver-name" id="textDriverName">DRIVER</div>
    <div class="text-message" id="textMessage"><span class="text-cursor"></span></div>
  </div>
</div>

VVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';

const PANEL_ID = 'simradio_control_panel_v1';
const PEER_CONFIG = {
  debug: 0,
  config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
};

let peer, hideTimer = null, textHideTimer = null, typingInterval = null;
const overlay = document.getElementById('radioOverlay');
const accentBar = document.getElementById('accentBar');
const carTypeLabel = document.getElementById('carTypeLabel');
const driverNameLabel = document.getElementById('driverNameLabel');
const textOverlay = document.getElementById('textOverlay');
const textAccentBar = document.getElementById('textAccentBar');
const textDriverName = document.getElementById('textDriverName');
const textMessage = document.getElementById('textMessage');

window.addEventListener('load', () => {
  setTimeout(() => { try { initOBS(); } catch(e) { console.error(e); } }, 500);
});

function initOBS() {
  peer = new Peer(OBS_PEER_ID, PEER_CONFIG);

  peer.on('open', () => {
    console.log('OBS peer ready');
    connectToPanel();
  });

  peer.on('connection', (conn) => {
    conn.on('data', (raw) => {
      try {
        const payload = JSON.parse(raw);
        if (payload.type === 'radio_fire') handleFire(payload);
        if (payload.type === 'text_fire') handleTextFire(payload);
      } catch(e) {}
    });
  });

  peer.on('error', (err) => {
    console.warn('OBS peer error:', err.type);
    if (err.type === 'unavailable-id') console.warn('Another OBS page is open');
    else setTimeout(initOBS, 3000);
  });

  peer.on('disconnected', () => peer.reconnect());
}

function connectToPanel() {
  const conn = peer.connect(PANEL_ID, { reliable: true });
  conn.on('open', () => {
    console.log('Panel connected');
    conn.on('data', (raw) => {
      try {
        const payload = JSON.parse(raw);
        if (payload.type === 'radio_fire') handleFire(payload);
        if (payload.type === 'text_fire') handleTextFire(payload);
      } catch(e) {}
    });
    conn.on('close', () => setTimeout(connectToPanel, 3000));
  });
  conn.on('error', () => setTimeout(connectToPanel, 3000));
}

function handleFire(payload) {
  const { driverName, carType, accentColor, textColor, position, audio, mimeType } = payload;

  accentBar.style.background = accentColor || '#e8181b';
  carTypeLabel.textContent = carType || 'DRIVER RADIO';
  carTypeLabel.style.color = (textColor || '#ffffff') + '70';
  driverNameLabel.textContent = driverName || 'DRIVER';
  driverNameLabel.style.color = textColor || '#ffffff';

  const pos = position || 'bottom-left';
  const isRight = pos.includes('right');

  overlay.className = 'radio-overlay pos-' + pos;
  void overlay.offsetWidth;
  overlay.classList.add(isRight ? 'show-right' : 'show-left');

  if (!audio) { scheduleHide(pos, isRight, 4); return; }

  try {
    const binary = atob(audio);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: mimeType || 'audio/webm' });

    // Play chirp first, then clip audio after chirp finishes
    const chirpAudio = new Audio(F1_CHIRP);
    chirpAudio.play().catch(e => console.warn('Chirp play failed:', e));

    chirpAudio.onended = () => {
      blob.arrayBuffer().then(buf => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume();
        ctx.decodeAudioData(buf.slice(0), (decoded) => {
          const src = ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(ctx.destination);
          src.start(0);
          scheduleHide(pos, isRight, decoded.duration);
          src.onended = () => ctx.close();
        }, () => {
          ctx.close();
          const url = URL.createObjectURL(blob);
          const a = new Audio(url);
          a.play().catch(e => console.warn('Audio play failed:', e));
          a.onloadedmetadata = () => scheduleHide(pos, isRight, a.duration);
          a.onended = () => URL.revokeObjectURL(url);
        });
      });
    };

    // If chirp fails to load, play clip anyway
    chirpAudio.onerror = () => {
      blob.arrayBuffer().then(buf => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume();
        ctx.decodeAudioData(buf.slice(0), (decoded) => {
          const src = ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(ctx.destination);
          src.start(0);
          scheduleHide(pos, isRight, decoded.duration);
          src.onended = () => ctx.close();
        }, () => { ctx.close(); scheduleHide(pos, isRight, 4); });
      });
    };

  } catch(e) {
    console.error('Audio error:', e);
    scheduleHide(pos, isRight, 4);
  }
}

function handleTextFire(payload) {
  const { driverName, carType, accentColor, textColor, position, message } = payload;

  // Stop any existing typing
  if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
  if (textHideTimer) { clearTimeout(textHideTimer); textHideTimer = null; }

  // Set styles
  textAccentBar.style.background = accentColor || '#e8181b';
  textDriverName.textContent = driverName || 'DRIVER';
  textDriverName.style.color = (textColor || '#ffffff') + '70';
  textMessage.style.color = textColor || '#ffffff';

  // Set position
  const pos = position || 'bottom-left';
  const isRight = pos.includes('right');
  textOverlay.className = 'text-overlay pos-' + pos;
  void textOverlay.offsetWidth;
  textOverlay.classList.add(isRight ? 'show-right' : 'show-left');

  // Start typing animation
  const chars = message.split('');
  let i = 0;
  textMessage.innerHTML = '<span class="text-cursor"></span>';
  const cursor = textMessage.querySelector('.text-cursor');

  typingInterval = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(typingInterval);
      typingInterval = null;
      // Keep cursor for a moment then remove it
      setTimeout(() => {
        if (cursor && cursor.parentNode) cursor.remove();
      }, 800);
      // Hold for 5 seconds then hide
      textHideTimer = setTimeout(() => hideTextOverlay(pos, isRight), 5000);
      return;
    }
    // Insert char before cursor
    const span = document.createElement('span');
    span.textContent = chars[i];
    textMessage.insertBefore(span, cursor);
    i++;
  }, 60); // 60ms per character
}

function hideTextOverlay(pos, isRight) {
  textOverlay.classList.remove('show-left', 'show-right');
  textOverlay.classList.add(isRight ? 'hide-right' : 'hide-left');
  setTimeout(() => {
    textOverlay.className = 'text-overlay pos-' + pos;
    textOverlay.style.opacity = '0';
    textMessage.innerHTML = '<span class="text-cursor"></span>';
  }, 450);
}


function scheduleHide(pos, isRight, duration) {
  if (hideTimer) clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    overlay.classList.remove('show-left', 'show-right');
    overlay.classList.add(isRight ? 'hide-right' : 'hide-left');
    setTimeout(() => {
      overlay.className = 'radio-overlay pos-' + pos;
      overlay.style.opacity = '0';
    }, 450);
  }, (duration * 1000) + 200);
}
</script>
