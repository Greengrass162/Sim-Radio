<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Radio Output</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1920px;
  height: 1080px;
  background: transparent !important;
  overflow: hidden;
}

/* OBS TRANSPARENT BACKGROUND — CRITICAL */
body {
  background: transparent !important;
}

/* ---- F1 OVERLAY ---- */
.radio-overlay {
  position: absolute;
  display: flex;
  align-items: stretch;
  opacity: 0;
  pointer-events: none;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.7));

  /* Default: bottom left F1 style */
  bottom: 80px;
  left: 60px;

  transform: translateY(20px);
  transition: none;
}

/* Positions */
.radio-overlay.pos-bottom-left { bottom: 80px; left: 60px; top: auto; right: auto; }
.radio-overlay.pos-bottom-right { bottom: 80px; right: 60px; left: auto; top: auto; }
.radio-overlay.pos-top-left { top: 80px; left: 60px; bottom: auto; right: auto; }
.radio-overlay.pos-top-right { top: 80px; right: 60px; bottom: auto; left: auto; }

/* SLIDE IN */
@keyframes slideIn {
  0%   { opacity: 0; transform: translateX(-32px); }
  15%  { opacity: 1; transform: translateX(4px); }
  22%  { transform: translateX(0); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
  0%   { opacity: 0; transform: translateX(32px); }
  15%  { opacity: 1; transform: translateX(-4px); }
  22%  { transform: translateX(0); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes slideOut {
  0%   { opacity: 1; transform: translateX(0); }
  70%  { opacity: 1; transform: translateX(0); }
  100% { opacity: 0; transform: translateX(-20px); }
}

@keyframes slideOutRight {
  0%   { opacity: 1; transform: translateX(0); }
  70%  { opacity: 1; transform: translateX(0); }
  100% { opacity: 0; transform: translateX(20px); }
}

.radio-overlay.show-left {
  animation: slideIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
}

.radio-overlay.show-right {
  animation: slideInRight 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
}

.radio-overlay.hide-left {
  animation: slideOut 0.4s ease-in forwards;
}

.radio-overlay.hide-right {
  animation: slideOutRight 0.4s ease-in forwards;
}

/* ACCENT BAR */
.accent-bar {
  width: 8px;
  background: #e8181b;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.accent-bar::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 40%);
}

/* MAIN BODY */
.overlay-body {
  background: rgba(12, 12, 15, 0.94);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 20px;
  min-width: 260px;
  position: relative;
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.overlay-body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
}

.car-type-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  line-height: 1;
  margin-bottom: 4px;
}

.driver-name-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 30px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1;
  color: #ffffff;
}

/* RADIO ICON SECTION */
.radio-section {
  background: rgba(12, 12, 15, 0.94);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 12px;
  border-left: 1px solid rgba(255,255,255,0.07);
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  border-right: 1px solid rgba(255,255,255,0.06);
}

.radio-icon {
  width: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
}

.radio-bar {
  height: 3px;
  background: rgba(255,255,255,0.7);
  border-radius: 2px;
  transform-origin: center;
}

/* AUDIO WAVE ANIMATION */
@keyframes wave1 { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.3)} }
@keyframes wave2 { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }
@keyframes wave3 { 0%,100%{transform:scaleY(0.8)} 33%{transform:scaleY(0.2)} 66%{transform:scaleY(1)} }

.radio-bar:nth-child(1) { width: 20px; animation: wave1 0.6s ease-in-out infinite; }
.radio-bar:nth-child(2) { width: 14px; animation: wave2 0.5s ease-in-out infinite 0.1s; }
.radio-bar:nth-child(3) { width: 18px; animation: wave3 0.7s ease-in-out infinite 0.05s; }
.radio-bar:nth-child(4) { width: 10px; animation: wave1 0.45s ease-in-out infinite 0.15s; }

.radio-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  writing-mode: vertical-lr;
  transform: rotate(180deg);
}

/* STATIC NOISE OVERLAY */
.static-overlay {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='200' height='60' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  background-size: cover;
  border-radius: inherit;
  mix-blend-mode: screen;
}

@keyframes staticPop {
  0%   { opacity: 0.12; }
  5%   { opacity: 0.06; }
  10%  { opacity: 0.1; }
  15%  { opacity: 0.04; }
  20%  { opacity: 0.08; }
  100% { opacity: 0; }
}

.show-left .static-overlay,
.show-right .static-overlay {
  animation: staticPop 0.4s ease-out forwards;
}

/* SCAN LINE */
.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  top: 0;
  pointer-events: none;
}

@keyframes scanDown {
  0%   { top: 0%; opacity: 0.8; }
  100% { top: 100%; opacity: 0; }
}

.show-left .scan-line,
.show-right .scan-line {
  animation: scanDown 0.5s ease-out forwards;
}

/* DEBUG indicator (hidden in prod) */
.debug-info {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-family: monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.5);
  padding: 4px 8px;
  display: none;
}
</style>
</head>
<body>

<!-- THE OVERLAY -->
<div class="radio-overlay pos-bottom-left" id="radioOverlay">
  <div class="accent-bar" id="accentBar"></div>
  <div class="overlay-body" id="overlayBody">
    <div class="car-type-label" id="carTypeLabel">TEAM RADIO</div>
    <div class="driver-name-label" id="driverNameLabel">DRIVER</div>
    <div class="static-overlay"></div>
    <div class="scan-line"></div>
  </div>
  <div class="radio-section" id="radioSection">
    <div class="radio-icon">
      <div class="radio-bar"></div>
      <div class="radio-bar"></div>
      <div class="radio-bar"></div>
      <div class="radio-bar"></div>
    </div>
    <div class="radio-label">Radio</div>
  </div>
</div>

<div class="debug-info" id="debugInfo">Connecting...</div>

<script>
const OBS_PEER_ID = 'simradio_obs_output_v1';
const PANEL_ID = 'simradio_control_panel_v1';

let peer;
let hideTimer = null;
let currentAudio = null;

const overlay = document.getElementById('radioOverlay');
const accentBar = document.getElementById('accentBar');
const carTypeLabel = document.getElementById('carTypeLabel');
const driverNameLabel = document.getElementById('driverNameLabel');
const debugInfo = document.getElementById('debugInfo');

const PEER_CONFIG = {
  debug: 0,
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
    ]
  }
};

function initOBS() {
  peer = new Peer(OBS_PEER_ID, PEER_CONFIG);

  peer.on('open', (id) => {
    debugInfo.textContent = 'OBS ready: ' + id;
    // Also connect back to panel as data channel
    connectToPanel();
  });

  peer.on('connection', (conn) => {
    conn.on('data', (rawData) => {
      try {
        const payload = JSON.parse(rawData);
        if (payload.type === 'radio_fire') {
          handleFire(payload);
        }
      } catch(e) {}
    });
  });

  peer.on('error', (err) => {
    debugInfo.textContent = 'Error: ' + err.type;
    if (err.type === 'unavailable-id') {
      // Another OBS page is open
      debugInfo.textContent = 'ID taken — close other OBS tab';
    }
    setTimeout(initOBS, 3000);
  });

  peer.on('disconnected', () => {
    peer.reconnect();
  });
}

function connectToPanel() {
  const conn = peer.connect(PANEL_ID, { reliable: true });
  conn.on('open', () => {
    debugInfo.textContent = 'Panel connected ✓';
    conn.on('data', (rawData) => {
      try {
        const payload = JSON.parse(rawData);
        if (payload.type === 'radio_fire') handleFire(payload);
      } catch(e) {}
    });
    conn.on('close', () => {
      debugInfo.textContent = 'Panel disconnected';
      setTimeout(connectToPanel, 3000);
    });
  });
  conn.on('error', () => {
    setTimeout(connectToPanel, 3000);
  });
}

function handleFire(payload) {
  const { driverName, carType, accentColor, textColor, position, audio, duration } = payload;

  // Update overlay content
  accentBar.style.background = accentColor || '#e8181b';
  carTypeLabel.textContent = carType || 'TEAM RADIO';
  carTypeLabel.style.color = (textColor || '#ffffff') + '70';
  driverNameLabel.textContent = driverName || 'DRIVER';
  driverNameLabel.style.color = textColor || '#ffffff';

  // Set position
  overlay.className = 'radio-overlay';
  const pos = position || 'bottom-left';
  overlay.classList.add('pos-' + pos);

  // Determine animation direction
  const isRight = pos.includes('right');

  // Stop existing audio
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  // Clear existing hide timer
  if (hideTimer) {
    clearTimeout(hideTimer);
    hideTimer = null;
    overlay.className = 'radio-overlay pos-' + pos;
  }

  // Decode and play audio
  let clipDuration = duration || 3;

  if (audio) {
    try {
      const binary = atob(audio);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);

      currentAudio = new Audio(url);
      currentAudio.play().catch(e => {
        // Autoplay blocked — common in browsers, needs user interaction first
        // OBS browser source usually allows this
        console.warn('Audio autoplay blocked:', e);
      });

      // Use actual audio duration once loaded
      currentAudio.addEventListener('loadedmetadata', () => {
        clipDuration = currentAudio.duration;
        scheduleHide(overlay, pos, isRight, clipDuration);
      });

      currentAudio.addEventListener('ended', () => {
        URL.revokeObjectURL(url);
      });
    } catch(e) {
      console.error('Audio decode error:', e);
    }
  }

  // Show overlay with animation
  void overlay.offsetWidth; // force reflow
  overlay.classList.add(isRight ? 'show-right' : 'show-left');

  // Schedule hide after clip duration
  scheduleHide(overlay, pos, isRight, clipDuration);
}

function scheduleHide(overlay, pos, isRight, duration) {
  if (hideTimer) clearTimeout(hideTimer);

  // Show for full clip duration + small buffer
  hideTimer = setTimeout(() => {
    overlay.classList.remove('show-left', 'show-right');
    overlay.classList.add(isRight ? 'hide-right' : 'hide-left');

    setTimeout(() => {
      overlay.className = 'radio-overlay pos-' + pos;
      // Reset to hidden state (opacity 0 from CSS)
      overlay.style.opacity = '0';
    }, 450);

  }, (duration * 1000) + 200);
}

window.addEventListener('load', () => {
  setTimeout(() => {
    try {
      initOBS();
    } catch(e) {
      console.error('OBS init error:', e);
    }
  }, 500);
});
</script>
</body>
</html>
