<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Radio — Connect</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --border: #1e1e24;
    --accent: #e8181b;
    --accent2: #ff4d1c;
    --text: #e8e8ec;
    --muted: #555560;
    --green: #00e676;
    --yellow: #ffd600;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 420px;
    max-width: 95vw;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo::before {
    content: '';
    display: block;
    width: 24px;
    height: 2px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    line-height: 0.9;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 48px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }

  label {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  select, input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    margin-bottom: 24px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus, input:focus {
    border-color: var(--accent);
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-70%);
    color: var(--muted);
    pointer-events: none;
    font-size: 14px;
  }

  .btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { background: #ff2528; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .status-area {
    margin-top: 28px;
    display: none;
  }

  .status-area.visible { display: block; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .dot.active {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  .dot.error { background: var(--accent); }
  .dot.pending { background: var(--yellow); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .status-text strong {
    color: var(--text);
    font-weight: 600;
  }

  .meter-wrap {
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: none;
  }

  .meter-wrap.visible { display: block; }

  .meter-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .meter-bar {
    height: 4px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--green), var(--yellow), var(--accent));
    transition: width 0.05s;
  }

  .peer-id-display {
    margin-top: 8px;
    padding: 10px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: none;
  }

  .peer-id-display.visible { display: block; }
  .peer-id-display span { color: var(--green); font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Radio System</div>
  <h1>DRIVER<br><span>RADIO</span></h1>
  <p class="subtitle">Connect your microphone to the broadcast panel</p>

  <div class="card" id="mainCard">
    <!-- populated by JS based on URL params -->
    <div id="noDriversMsg" style="display:none;text-align:center;padding:12px 0 24px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:0.1em;">
        No driver list found.<br>Ask your broadcast operator for the correct link.
      </div>
    </div>

    <label id="selectLabel">Select Your Name</label>
    <div class="select-wrap">
      <select id="driverSelect">
        <option value="">— Choose your name —</option>
      </select>
    </div>

    <button class="btn" id="connectBtn" onclick="startConnection()">Connect Microphone</button>

    <div class="status-area" id="statusArea">
      <div class="status-row">
        <div class="dot" id="micDot"></div>
        <div class="status-text" id="micStatus">Requesting microphone...</div>
      </div>
      <div class="status-row">
        <div class="dot" id="peerDot"></div>
        <div class="status-text" id="peerStatus">Connecting to network...</div>
      </div>
      <div class="status-row">
        <div class="dot" id="panelDot"></div>
        <div class="status-text" id="panelStatus">Waiting for control panel...</div>
      </div>
      <div class="meter-wrap" id="meterWrap">
        <div class="meter-label">Mic Level</div>
        <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
      </div>
      <div class="peer-id-display" id="peerIdDisplay">
        Your session ID: <span id="peerIdSpan"></span>
      </div>
    </div>
  </div>
</div>

<script>
const ROOM_PREFIX = 'simradio_driver_';
const PANEL_ID = 'simradio_control_panel_v1';

let peer, localStream, audioContext, analyser, animFrame;

// --- BUILD DROPDOWN FROM URL ---
(function buildDriverList() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('drivers');
  const select = document.getElementById('driverSelect');

  if (!raw) {
    document.getElementById('noDriversMsg').style.display = 'block';
    document.getElementById('selectLabel').style.display = 'none';
    select.style.display = 'none';
    select.closest('.select-wrap').style.display = 'none';
    document.getElementById('connectBtn').disabled = true;
    return;
  }

  const drivers = raw.split(',').map(d => decodeURIComponent(d.trim())).filter(Boolean);
  drivers.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
})();

function setDot(id, state) {
  const d = document.getElementById(id);
  d.className = 'dot ' + state;
}

function setText(id, html) {
  document.getElementById(id).innerHTML = html;
}

async function startConnection() {
  const select = document.getElementById('driverSelect');
  const driverName = select.value;

  if (!driverName) {
    alert('Please select a driver first.');
    return;
  }

  document.getElementById('connectBtn').disabled = true;
  document.getElementById('statusArea').classList.add('visible');

  setDot('micDot', 'pending');
  setText('micStatus', 'Requesting microphone access...');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    setDot('micDot', 'active');
    setText('micStatus', '<strong>Microphone active</strong>');
    startMeter(localStream);
  } catch(e) {
    setDot('micDot', 'error');
    setText('micStatus', 'Microphone denied — check browser permissions');
    document.getElementById('connectBtn').disabled = false;
    return;
  }

  setDot('peerDot', 'pending');
  setText('peerStatus', 'Connecting to network...');

  const PEER_CONFIG = {
    debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
      ]
    }
  };

  // Sanitize driver name for peer ID
  const safeId = ROOM_PREFIX + driverName.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase() + '_' + Math.floor(Math.random()*900+100);
  peer = new Peer(safeId, PEER_CONFIG);

  peer.on('open', (id) => {
    setDot('peerDot', 'active');
    setText('peerStatus', '<strong>Network connected</strong>');
    document.getElementById('peerIdDisplay').classList.add('visible');
    document.getElementById('peerIdSpan').textContent = id;
    callPanel(driverName, id);
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      // Try again with different random suffix
      const retryId = ROOM_PREFIX + driverName.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase() + '_' + Math.floor(Math.random()*9000+1000);
      peer.destroy();
      peer = new Peer(retryId, PEER_CONFIG);
      peer.on('open', (id) => {
        setDot('peerDot', 'active');
        setText('peerStatus', '<strong>Network connected</strong>');
        document.getElementById('peerIdDisplay').classList.add('visible');
        document.getElementById('peerIdSpan').textContent = id;
        callPanel(driverName, id);
      });
    } else {
      setDot('peerDot', 'error');
      setText('peerStatus', 'Network error: ' + err.type);
    }
  });
}

let heartbeatInterval = null;
let currentCall = null;

function callPanel(driverName, myId) {
  setDot('panelDot', 'pending');
  setText('panelStatus', 'Calling control panel...');

  const call = peer.call(PANEL_ID, localStream, {
    metadata: { driverName, peerId: myId }
  });

  if (!call) {
    setText('panelStatus', 'Panel not online yet — will retry...');
    setTimeout(() => callPanel(driverName, myId), 4000);
    return;
  }

  currentCall = call;

  // Keepalive — send silent audio context ping every 4s to prevent idle timeout
  if (heartbeatInterval) clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(() => {
    if (localStream && localStream.active) {
      // Stream is still alive, nothing needed
      // Just checking keeps the connection warm
    } else {
      clearInterval(heartbeatInterval);
    }
  }, 4000);

  call.on('stream', () => {
    setDot('panelDot', 'active');
    setText('panelStatus', '<strong>Live to control panel ✓</strong>');
  });

  call.on('error', () => {
    setDot('panelDot', 'error');
    setText('panelStatus', 'Connection to panel lost — retrying...');
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    setTimeout(() => callPanel(driverName, myId), 4000);
  });

  call.on('close', () => {
    setDot('panelDot', 'error');
    setText('panelStatus', 'Panel disconnected — retrying...');
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    setTimeout(() => callPanel(driverName, myId), 4000);
  });

  setTimeout(() => {
    if (document.getElementById('panelDot').className.includes('pending')) {
      setText('panelStatus', 'Panel not open yet — retrying...');
      call.close();
      setTimeout(() => callPanel(driverName, myId), 4000);
    }
  }, 8000);
}

function startMeter(stream) {
  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  document.getElementById('meterWrap').classList.add('visible');
  drawMeter();
}

function drawMeter() {
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b) => a+b, 0) / data.length;
  const pct = Math.min(100, avg * 3);
  document.getElementById('meterFill').style.width = pct + '%';
  animFrame = requestAnimationFrame(drawMeter);
}
</script>
<div style="position:fixed;bottom:6px;right:10px;font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#2a2a35;pointer-events:none;z-index:9999;">V1</div>
</body>
</html>
