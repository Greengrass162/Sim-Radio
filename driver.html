<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Radio — Connect</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c; --surface: #111114; --border: #1e1e24;
  --accent: #e8181b; --accent2: #ff4d1c; --text: #e8e8ec;
  --muted: #555560; --green: #00e676; --yellow: #ffd600;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px); pointer-events: none; z-index: 0; }
.container { position: relative; z-index: 1; width: 420px; max-width: 95vw; }
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
.logo::before { content: ''; display: block; width: 24px; height: 2px; background: var(--accent); }
h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 52px; line-height: 0.9; text-transform: uppercase; margin-bottom: 8px; }
h1 span { color: var(--accent); }
.subtitle { font-size: 13px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 48px; font-weight: 300; }
.card { background: var(--surface); border: 1px solid var(--border); padding: 32px; position: relative; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2), transparent); }
label { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: #ff2528; }
.btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
.status-area { margin-top: 28px; display: none; }
.status-area.visible { display: block; }
.status-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); margin-bottom: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
.dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
.dot.error { background: var(--accent); }
.dot.pending { background: var(--yellow); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.status-text { font-size: 13px; color: var(--muted); }
.status-text strong { color: var(--text); font-weight: 600; }
.meter-wrap { padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); display: none; }
.meter-wrap.visible { display: block; }
.meter-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.meter-bar { height: 4px; background: var(--border); overflow: hidden; }
.meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--yellow), var(--accent)); transition: width 0.05s; }

/* ROSTER NAME GRID */
.roster-loading { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; letter-spacing: 0.1em; }
.name-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; max-height: 280px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.name-btn { width: 100%; padding: 13px 16px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
.name-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.name-btn.selected { border-color: var(--accent); background: rgba(232,24,27,0.08); color: var(--accent); }
.name-btn:disabled { opacity: 0.35; cursor: not-allowed; color: var(--muted); }
.name-btn .taken-label { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); }
.name-btn.selected .taken-label { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Radio System</div>
  <h1>DRIVER<br><span>RADIO</span></h1>
  <p class="subtitle">Connect your microphone to the broadcast panel</p>
  <div class="card" id="mainCard">
    <div id="rosterSection">
      <label id="selectLabel">Select Your Name</label>
      <div class="name-grid" id="nameGrid">
        <div class="roster-loading" id="rosterLoading">Connecting to panel...</div>
      </div>
    </div>
    <button class="btn" id="connectBtn" onclick="startConnection()" disabled>Connect Microphone</button>
    <div class="status-area" id="statusArea">
      <div class="status-row"><div class="dot" id="micDot"></div><div class="status-text" id="micStatus">Requesting microphone...</div></div>
      <div class="status-row"><div class="dot" id="peerDot"></div><div class="status-text" id="peerStatus">Connecting to network...</div></div>
      <div class="status-row"><div class="dot" id="panelDot"></div><div class="status-text" id="panelStatus">Waiting for control panel...</div></div>
      <div class="meter-wrap" id="meterWrap">
        <div class="meter-label">Mic Level</div>
        <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
      </div>
    </div>
  </div>
</div>
<div style="position:fixed;bottom:6px;right:10px;font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#2a2a35;pointer-events:none;z-index:9999;">V6</div>
<script>
const PANEL_ID = 'simradio_control_panel_v1';
const PEER_CONFIG = {
  debug: 0,
  config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
};

let peer, localStream, audioCtx, analyser, animFrame;
let dataConn = null;
let rosterConn = null; // separate connection just for roster sync
let localRecorder = null;
let localAllChunks = [], localChunks = [];
let heartbeatInterval = null;
let selectedName = null;
let takenNames = new Set();
let roster = [];

// ---- PEER INIT ----
window.addEventListener('load', () => {
  setTimeout(initPeer, 500);
});

function initPeer() {
  const tempId = 'simradio_roster_' + Math.floor(Math.random() * 900000 + 100000);
  peer = new Peer(tempId, PEER_CONFIG);
  peer.on('open', () => requestRoster());
  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      peer.destroy();
      initPeer();
    } else {
      showRosterMsg('Could not connect to network. Retrying...');
      setTimeout(initPeer, 4000);
    }
  });
}

let rosterRetryTimer = null;
let rosterConnecting = false;

function requestRoster() {
  if (rosterConnecting) return;
  rosterConnecting = true;
  if (rosterRetryTimer) { clearTimeout(rosterRetryTimer); rosterRetryTimer = null; }

  showRosterMsg('Connecting to panel...');

  // Clean up old connection
  if (rosterConn) { try { rosterConn.close(); } catch(e){} rosterConn = null; }

  rosterConn = peer.connect(PANEL_ID, { reliable: true, metadata: { type: 'roster_request' } });

  let opened = false;

  rosterConn.on('open', () => {
    opened = true;
    showRosterMsg('Fetching roster...');
    try { rosterConn.send(JSON.stringify({ type: 'roster_request' })); } catch(e){}
  });

  rosterConn.on('data', (raw) => {
    try {
      const msg = JSON.parse(raw);
      if (msg.type === 'roster_update') {
        roster = msg.roster || [];
        takenNames = new Set(msg.taken || []);
        rosterConnecting = false;
        renderRoster();
      }
    } catch(e) {}
  });

  rosterConn.on('close', () => {
    rosterConnecting = false;
    if (!dataConn) scheduleRosterRetry('Panel disconnected. Retrying in 5s...');
  });

  rosterConn.on('error', () => {
    rosterConnecting = false;
    scheduleRosterRetry('Panel not open yet. Retrying in 5s...');
  });

  // Timeout if no response
  rosterRetryTimer = setTimeout(() => {
    if (!opened || !roster.length) {
      rosterConnecting = false;
      try { rosterConn.close(); } catch(e){}
      scheduleRosterRetry('Panel not responding. Retrying in 5s...');
    }
  }, 8000);
}

function scheduleRosterRetry(msg) {
  if (dataConn) return; // already connected via audio, don't retry
  showRosterMsg(msg);
  if (rosterRetryTimer) clearTimeout(rosterRetryTimer);
  rosterRetryTimer = setTimeout(requestRoster, 5000);
}

function showRosterMsg(msg) {
  document.getElementById('rosterLoading').textContent = msg;
  document.getElementById('rosterLoading').style.display = 'block';
}

function renderRoster() {
  const grid = document.getElementById('nameGrid');
  document.getElementById('rosterLoading').style.display = 'none';

  if (!roster.length) {
    grid.innerHTML = '<div class="roster-loading">No drivers added yet — ask your operator to add them.</div>';
    return;
  }

  // Keep existing buttons, just update state
  grid.innerHTML = '';
  roster.forEach(name => {
    const isTaken = takenNames.has(name) && name !== selectedName;
    const isSelected = name === selectedName;
    const btn = document.createElement('button');
    btn.className = 'name-btn' + (isSelected ? ' selected' : '');
    btn.disabled = isTaken;
    btn.innerHTML = `<span>${name}</span>${isTaken ? '<span class="taken-label">IN USE</span>' : ''}`;
    btn.onclick = () => selectName(name);
    grid.appendChild(btn);
  });

  // Re-enable connect button if a valid name is selected
  const connectBtn = document.getElementById('connectBtn');
  if (selectedName && !takenNames.has(selectedName)) {
    connectBtn.disabled = false;
  }
}

function selectName(name) {
  if (takenNames.has(name)) return;
  selectedName = name;
  renderRoster();
  document.getElementById('connectBtn').disabled = false;
}

// ---- CONNECT ----
function setDot(id, state) { document.getElementById(id).className = 'dot ' + state; }
function setText(id, html) { document.getElementById(id).innerHTML = html; }

async function startConnection() {
  if (!selectedName) { alert('Please select your name first.'); return; }

  document.getElementById('connectBtn').disabled = true;
  document.getElementById('rosterSection').style.opacity = '0.5';
  document.getElementById('rosterSection').style.pointerEvents = 'none';
  document.getElementById('statusArea').classList.add('visible');

  setDot('micDot', 'pending');
  setText('micStatus', 'Requesting microphone...');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    setDot('micDot', 'active');
    setText('micStatus', '<strong>Microphone active</strong>');
    startMeter(localStream);
  } catch(e) {
    setDot('micDot', 'error');
    setText('micStatus', 'Microphone denied — check browser permissions');
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('rosterSection').style.opacity = '';
    document.getElementById('rosterSection').style.pointerEvents = '';
    return;
  }

  setDot('peerDot', 'active');
  setText('peerStatus', '<strong>Network connected</strong>');
  connectToPanel(selectedName);
}

function connectToPanel(driverName) {
  setDot('panelDot', 'pending');
  setText('panelStatus', 'Connecting to panel...');

  dataConn = peer.connect(PANEL_ID, { reliable: true, metadata: { driverName, type: 'audio' } });

  dataConn.on('open', () => {
    setDot('panelDot', 'active');
    setText('panelStatus', '<strong>Connected ✓ — mic recording</strong>');
    // Tell panel this name is now taken
    dataConn.send(JSON.stringify({ type: 'name_taken', driverName }));
    startLocalRecording(driverName);
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(() => {
      if (dataConn && dataConn.open) dataConn.send(JSON.stringify({ type: 'ping' }));
    }, 4000);
  });

  dataConn.on('data', (raw) => {
    try {
      const msg = JSON.parse(raw);
      // Panel can push roster updates even during audio session
      if (msg.type === 'roster_update') {
        roster = msg.roster || [];
        takenNames = new Set(msg.taken || []);
        renderRoster();
      }
    } catch(e) {}
  });

  dataConn.on('close', () => {
    setDot('panelDot', 'error');
    setText('panelStatus', 'Panel disconnected — retrying...');
    stopRecording();
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    setTimeout(() => connectToPanel(driverName), 4000);
  });

  dataConn.on('error', () => {
    setDot('panelDot', 'error');
    setText('panelStatus', 'Connection error — retrying...');
    setTimeout(() => connectToPanel(driverName), 4000);
  });

  setTimeout(() => {
    if (document.getElementById('panelDot').className.includes('pending')) {
      setText('panelStatus', 'Panel not open yet — retrying...');
      if (dataConn) dataConn.close();
      setTimeout(() => connectToPanel(driverName), 4000);
    }
  }, 8000);
}

function stopRecording() {
  if (localRecorder && localRecorder.state !== 'inactive') {
    try { localRecorder.stop(); } catch(e) {}
  }
}

function startLocalRecording(driverName) {
  stopRecording();
  localAllChunks = []; localChunks = [];
  const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg'].find(m => MediaRecorder.isTypeSupported(m)) || '';
  try {
    localRecorder = mimeType ? new MediaRecorder(localStream, { mimeType }) : new MediaRecorder(localStream);
  } catch(e) { setText('panelStatus', 'Recorder error: ' + e.message); return; }

  let chunkIndex = 0;
  localRecorder.ondataavailable = (e) => {
    if (!e.data || e.data.size < 50) return;
    const isFirst = chunkIndex === 0; chunkIndex++;
    localAllChunks.push(e.data);
    if (localAllChunks.length > 61) localAllChunks = [localAllChunks[0], ...localAllChunks.slice(-60)];
    localChunks.push(e.data);
    if (localChunks.length > 60) localChunks.shift();
    if (!dataConn || !dataConn.open) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      try { dataConn.send(JSON.stringify({ type: 'chunk', driverName, data: reader.result.split(',')[1], mimeType: localRecorder.mimeType, isFirst, size: e.data.size })); }
      catch(err) { console.error('Send error:', err); }
    };
    reader.readAsDataURL(e.data);
  };
  localRecorder.onerror = (e) => console.error('Recorder error:', e);
  localRecorder.start(1000);
}

function startMeter(stream) {
  audioCtx = new AudioContext();
  audioCtx.resume().then(() => {
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    document.getElementById('meterWrap').classList.add('visible');
    drawMeter();
  });
}

function drawMeter() {
  if (!analyser) { animFrame = requestAnimationFrame(drawMeter); return; }
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  document.getElementById('meterFill').style.width = Math.min(100, data.reduce((a,b)=>a+b,0)/data.length*3) + '%';
  animFrame = requestAnimationFrame(drawMeter);
}
</script>
</body>
</html>
